app-id: app.bluebubbles.BlueBubbles
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
command: bluebubbles
separate-locales: false
finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --socket=pulseaudio
  - --system-talk-name=org.freedesktop.NetworkManager
  - --system-talk-name=org.freedesktop.NetworkManager.Connection.Active
  - --system-talk-name=org.freedesktop.FileManager1
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
  - --env=NOTIFY_IGNORE_PORTAL=1
  - --share=network
modules:
  - 'shared-modules/libappindicator/libappindicator-gtk3-12.10.json'
  - name: xorg-libXmu
    sources:
      - type: git
        url: https://gitlab.freedesktop.org/xorg/lib/libxmu.git
        tag: libXmu-1.2.1
        commit: 792f80402ee06ce69bca3a8f2a84295999c3a170
  - name: wmctrl
    sources:
      - type: git
        url: https://github.com/dancor/wmctrl.git
        commit: 0181e8e4a7ed98255f6ef930875e56560f19aa95
  - name: objectbox
    buildsystem: simple
    build-commands:
      - cp -r libobjectbox.so /app/lib/
    sources:
      - type: archive
        only-arches:
          - x86_64
        url: https://github.com/objectbox/objectbox-c/releases/download/v5.0.0-rc/objectbox-linux-x64.tar.gz
        sha256: 280195f19594227068fcf389d32d5b315c9a6daabc3115cd3aac9c3cc8ad39a8
      - type: archive
        only-arches:
          - aarch64
        url: https://github.com/objectbox/objectbox-c/releases/download/v5.0.0-rc/objectbox-linux-aarch64.tar.gz
        sha256: d11d7be8b5ff9cac361de050f634be02f82571b0a16c76da0ca33cf2adc2613e
  - name: libidn
    config-opts:
      - --disable-static
    sources:
      - type: archive
        url: https://ftp.gnu.org/gnu/libidn/libidn-1.43.tar.gz
        sha256: bdc662c12d041b2539d0e638f3a6e741130cdb33a644ef3496963a443482d164
    cleanup:
      - /bin/*
      - /share/*
  - name: libmpv
    buildsystem: meson
    config-opts:
      - -Dlibmpv=true
      - -Dcplayer=false
      - -Dalsa=disabled
      - -Dmanpage-build=disabled
    build-options:
      libdir: /app/lib
    sources:
      - type: git
        url: https://github.com/mpv-player/mpv.git
        tag: v0.41.0
        commit: 41f6a645068483470267271e1d09966ca3b9f413
        x-checker-data:
          type: git
          tag-pattern: ^v([\d.]+)$
    modules:
      - name: nv-codec-headers
        no-autogen: true
        make-install-args:
          - PREFIX=/app
        sources:
          - type: git
            url: https://github.com/FFmpeg/nv-codec-headers.git
            tag: n13.0.19.0
            commit: e844e5b26f46bb77479f063029595293aa8f812d
            x-checker-data:
              type: git
              tag-pattern: ^n([\d.]+)$
        cleanup:
          - '*'
      - name: libass
        config-opts:
          - --disable-static
        sources:
          - type: git
            url: https://github.com/libass/libass.git
            tag: 0.17.4
            commit: bbb3c7f1570a4a021e52683f3fbdf74fe492ae84
            x-checker-data:
              type: git
              tag-pattern: ^([\d.]+)$
      - name: libplacebo
        buildsystem: meson
        config-opts:
          - -Dshaderc=enabled
          - -Dvulkan=enabled
          - -Dd3d11=disabled
          - -Ddemos=false
        build-options:
          libdir: /app/lib
        sources:
          - type: git
            url: https://code.videolan.org/videolan/libplacebo.git
            tag: v7.349.0
            commit: 1fd3c7bde7b943fe8985c893310b5269a09b46c5
            x-checker-data:
              type: git
              tag-pattern: ^v([\d.]+)$
          - type: patch
            path: patches/libplacebo-vulkan-utils_gen-python.patch
        
  - name: fmedia
    buildsystem: simple
    only_arches:
      - x86_64
    build-commands:
      - mkdir -p /app/bin
      - cp -r fmedia-1 /app/bin
      - ln -s /app/bin/fmedia-1/fmedia /app/bin/fmedia
    sources:
      - type: archive
        dest: fmedia-1
        url: https://master.dl.sourceforge.net/project/fmedia/v1.23.1/fmedia-1.23.1-linux-amd64.tar.xz
        sha256: 14b181aef14addcfc08e23a9b47c9eba8d2d5359f90a6155a5254f501036a846
  - name: arp
    buildsystem: simple
    build-commands:
      - yes "" | make arp
      - install -Dm755 arp /app/bin/arp
    sources:
      - type: git
        url: https://github.com/ecki/net-tools.git
        tag: v2.10
        commit: 80d7b95067f1f22fece9537dea6dff53081f4886
  - name: bluebubbles
    buildsystem: simple
    build-commands:
      - cp -r bluebubbles /app/
      - mkdir -p /app/bin
      - ln -s /app/bluebubbles/bluebubbles /app/bin/bluebubbles
      - install -Dm644 app.bluebubbles.BlueBubbles.metainfo.xml -t /app/share/metainfo/
      - install -Dm644 128x128.png /app/share/icons/hicolor/128x128/apps/${FLATPAK_ID}.png
      - install -Dm644 app.bluebubbles.BlueBubbles.desktop -t /app/share/applications/
    sources:
      - type: archive
        only_arches:
          - x86_64
        dest: bluebubbles
        url: https://github.com/BlueBubblesApp/bluebubbles-app/releases/download/v1.15.7%2B76-desktop/bluebubbles-linux-x86_64.tar.gz
        sha256: 80e421d77e463cad75fa0fc73577fdbf6a99d7c1c80d9dc939bdbba4053a9bd4
      - type: archive
        only_arches:
          - aarch64
        dest: bluebubbles
        url: https://github.com/BlueBubblesApp/bluebubbles-app/releases/download/v1.15.7%2B76-desktop/bluebubbles-linux-aarch64.tar.gz
        sha256: c850cf686c449c6f6c1628a7ed01e47761f4d1dfd5275904716a4c63f56a3396
      - type: file
        url: https://raw.githubusercontent.com/BlueBubblesApp/bluebubbles-app/refs/tags/v1.15.7%2B76-desktop/flatpak/app.bluebubbles.BlueBubbles.metainfo.xml
        sha256: cffeb7d6baf2e230847b659449d9decbc1685f79637e63a1509c100189a46e37
      - type: file
        url: https://raw.githubusercontent.com/BlueBubblesApp/bluebubbles-app/refs/tags/v1.15.7%2B76-desktop/flatpak/icon/128x128.png
        sha256: 9fc90e23472662301346fa83255c4288c76e723464a2ed2896a46ead19cf320b
      - type: file
        url: https://raw.githubusercontent.com/BlueBubblesApp/bluebubbles-app/refs/tags/v1.15.7%2B76-desktop/flatpak/app.bluebubbles.BlueBubbles.desktop
        sha256: 28f10e1c68a5e27da72cb29619678d3dfdd4b38a753a2815a80d87972a380eda
    cleanup:
      - /bluebubbles/data/flutter_assets/packages/media_kit/
      - /bluebubbles/data/flutter_assets/packages/record_web/
      - /bluebubbles/data/flutter_assets/packages/wakelock_plus/
  - name: pdfium
    buildsystem: simple
    build-commands:
      - mv libpdfium/libpdfium.so /app/bluebubbles/lib
    sources:
      - type: archive
        only_arches:
          - x86_64
        url: https://github.com/bblanchon/pdfium-binaries/releases/download/chromium%2F7763/pdfium-linux-x64.tgz
        sha256: e3f0c66b2daad710cb6c8edd4a8c45c8902995e359dc0775917fc16e2e56349d
        dest: libpdfium
      - type: archive
        only_arches:
          - aarch64
        url: https://github.com/bblanchon/pdfium-binaries/releases/download/chromium%2F7763/pdfium-linux-arm64.tgz
        sha256: 1518d09bbf09a1bef27a6f93656d95b55bd22bcaecda597679e05f4e82c5fbfa
        dest: libpdfium
cleanup:
  - /include
  - /lib/pkgconfig
  - /share/man
  - /man

